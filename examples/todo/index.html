<!doctype html>
<head>
    <meta charset="utf-8">
    <title>Ripple • TodoMVC</title>
    <link rel="stylesheet" href="./base.css">
    <link rel="stylesheet" href="./index.css">
</head>
</html>
<script type="module">
    import { $, value, render, HTML } from '../../index.js'
    const { section, div, header, input, h1, label, ul, footer, span, button, li, a, body } = HTML
    const items = window.items = $({
        0: { completed: false, title: 'foo' },
        1: { completed: true, title: 'boo' },
    })
    window.value = value
    const ESC = 27
    const ENTER = 13
    const filters = window.filters = {
        completed: items.filter('completed', true),
        active: items.filter('completed', false),
        all: items,
    }

    const active_count = filters.active.length()
    const completed_count = filters.completed.length()
    const total_count = items.length()
    const all_complete = items.to(v => {
        let n = 0, c = 0
        for (const i in v) { n++; if (v[i].completed) c++ }
        return n > 0 && n === c
    })

    const selected = window.selected = $(filters.all)
    const route = window.route = $('all')

    const change_view = () => {
        const r = document.location.hash.split('/').pop() || 'all'
        route[value] = r
        selected[value] = filters[r] ?? filters.all
    }

    addEventListener('hashchange', change_view)
    change_view()

    const toggle = item => () => {
        item.completed = !item.completed[value]
    }

    const edit = item => ev => {
        item.editing = true
        item.text = item.title[value]
        ev.target.parentNode.parentNode.querySelector('.edit').focus()
    }

    const clear = () => {
        for (const [id, { completed }] of Object.entries(items[value])) {
            if (completed === true) {
                delete items[id]
            }
        }
    }

    const destroy = id => ev => {
        delete items[id]
    }

    const submit = (item, id) => ev => {
        if (item.cancelling[value]) {
            delete item.editing
            delete item.text
            delete item.cancelling
            return
        }
        const text = (item.text[value] ?? '').trim()
        if (text === '') {
            delete items[id]
            return
        }
        item.title = text
        delete item.editing
        delete item.text
    }

    const change = item => ev => {
        item.text = ev.target.value
    }

    const keydown = item => ev => {
        if (ev.which === ENTER) ev.target.blur()
        if (ev.which === ESC) {
            item.cancelling = true
            ev.target.blur()
        }
    }

    const add_todo = ev => {
        if (ev.which !== ENTER) return
        const title = ev.target.value.trim()
        if (title === '') return
        items.insert({ title, completed: false })
        ev.target.value = ''
    }

    const toggle_all = ev => {
        const checked = ev.target.checked
        for (const id in items[value]) {
            items[id].completed = checked
        }
    }

    const head = header.header(
        h1('todos'),
        input.new_todo
        ['placeholder=What needs to be done?']
        ['autofocus=']
            .on('keydown', add_todo)
    )

    const main = section.main
        .class('hidden', total_count.to(n => n === 0))
        .nodes(
            input.toggle_all['#toggle-all']['type=checkbox']
                .attr('checked', all_complete)
                .on('change', toggle_all),
            label['for=toggle-all']('Mark all as complete'),
            ul.todo_list(
                li(selected, (li, item, id) => li
                    .class('completed', item.completed)
                    .class('editing', item.editing)
                    .nodes(
                        div.view(
                            input.toggle['type=checkbox']
                                .attr('checked', item.completed)
                                .on('change', toggle(item)),
                            label
                                .on('dblclick', edit(item))
                                .text(item.title),
                            button.destroy
                                .on('click', destroy(id))
                        ),
                        input.edit
                            .attr('value', item.text)
                            .on('blur', submit(item, id))
                            .on('change', change(item))
                            .on('keydown', keydown(item))
                    )
                )
            )
        )

    const foot = footer.footer
        .class('hidden', total_count.to(n => n === 0))
        .nodes(
            span.todo_count.text(active_count.to(n => `${n} item${n === 1 ? '' : 's'} left`)),
            ul.filters(
                li(a['href=#/'].class('selected', route.to(r => r === 'all'))('All')),
                li(a['href=#/active'].class('selected', route.to(r => r === 'active'))('Active')),
                li(a['href=#/completed'].class('selected', route.to(r => r === 'completed'))('Completed')),
            ),
            button
                .clear_completed('Clear completed')
                .class('hidden', completed_count.to(n => n === 0))
                .on('click', clear)
        )

    render(document.body, body(
        section.todoapp(
            head,
            main,
            foot,
        )
    ))

</script>
