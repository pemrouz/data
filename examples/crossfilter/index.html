<!doctype html>
<link rel="stylesheet" href="./index.css">
<body>
  <div id="loader" class="loader">
    <div class="loader-mark">data<span class="loader-cursor">_</span></div>
    <div class="loader-status">streaming flight records</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div class="loader-meta">
      <span class="loader-pct">0%</span>
      <span class="loader-sep">·</span>
      <span class="loader-bytes">0.0 / 35.6 MB</span>
      <span class="loader-sep">·</span>
      <span class="loader-rate">…</span>
    </div>
    <div class="loader-detail">231,083 records · January 2001 · ASA Data Expo</div>
  </div>
</body>
<script type="module">
  import { $, render, HTML, SVG, value } from '../../index.js'

  // Stream-fetch the dataset with live progress, then dynamic-import via a
  // Blob URL. The original `import { data } from './flights.js'` blocks the
  // module silently for several seconds on first visit; streaming gives us
  // real bytes/sec to show in the loader.
  const data = await loadFlights()

  const { svg, g, path, rect, clipPath, line, text } = SVG
  const { div, body, span, a, h1, h2, p, aside, footer, code } = HTML
  const { min, max, floor } = Math
  const { keys } = Object

  // format helpers
  const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December']
  const pad = d => d.length === 1 ? ('0' + d) : d
  const formatDistance = d => d === undefined ? undefined
    : d.toLocaleString() + ' mi.'
  const formatChange = d => d === undefined ? undefined
    : (d < 0 ? '' : '+') + d + 'min.'
  const formatTime = d => d === undefined ? undefined
    : pad('' + (d.getHours() % 12)) + ':' +
    pad('' + d.getMinutes()) + ' ' +
    (d.getHours() > 12 ? 'PM' : 'AM')
  const formatDate = d =>
    months[d.date.getMonth()] + ' ' +
    d.date.getDate() + ', ' +
    d.date.getFullYear()

  // grouping helpers
  const byDay = d => floor(d.date / 86400000) * 86400000
  const byHour = d => floor(d.time)
  const byTenMins = d => floor(d.delay / 10) * 10
  const byFiftyMiles = d => floor(d.distance / 50) * 50

  // parsed flights
  const source = $(data)
  const flights = window.flights = source.map(({ destination, origin, ...d }) => {
    const date = parseDate(d.date)
    const time = date.getHours() + date.getMinutes() / 60
    const delay = max(-60, min(149, d.delay))
    const distance = min(1999, d.distance)
    return { date, time, delay, distance, origin, destination }
  }).za('date', Infinity)

  // current filters for each dimension
  const filters = window.filters = $({
    delay: [],
    distance: [],
    time: [],
    date: [+new Date(2001, 1, 1), +new Date(2001, 2, 1)],
  })

  // flights filtered by selected ranges
  const delay = window.delay = flights.between('delay', filters.delay)
  const distance = window.distance = flights.between('distance', filters.distance)
  const date = window.date = flights.between('date', filters.date)
  const time = window.time = flights.between('time', filters.time)
  const active = window.x = date.intersect(distance, delay, time)
window.v = value
  // data to drive charts
  const charts = window.charts = {
    time: {
      title: 'Time of Day',
      data: delay.intersect(distance, date).length(byHour),
      domain: [0, 24],
      width: 240,
      ticks: [0, 5, 10, 15, 20],
      format: String,
    },
    delay: {
      title: 'Arrival Delay (min.)',
      data: distance.intersect(date, time).length(byTenMins),
      domain: [-60, 150],
      width: 210,
      ticks: [-60, -30, 0, 30, 60, 90, 120, 150],
      format: String,
    },
    distance: {
      title: 'Distance (mi.)',
      data: delay.intersect(date, time).length(byFiftyMiles),
      domain: [0, 2000],
      width: 400,
      ticks: [0, 500, 1000, 1500, 2000],
      format: String,
    },
    date: {
      title: 'Date',
      data: delay.intersect(distance, time).length(byDay),
      domain: [+new Date(2001, 0, 1), +new Date(2001, 3, 1)],
      width: 900,
      ticks: [+new Date(2001, 0, 1), +new Date(2001, 1, 1), +new Date(2001, 2, 1), +new Date(2001, 3, 1)],
      format: t => months[new Date(t).getMonth()],
      round: t => Math.round(t / 86400000) * 86400000,
    },
  }

  // data for list
  const flightsByDate = window.ac = (window.limit = active
    .limit(80))
    .group(formatDate)

  // render everything
  render(document.body, body(
    h1('crossfilter'),
    h2('fast multidimensional filtering for coordinated views.'),
    p(
      'This page recreates Square\'s classic Crossfilter demo, but where the original ships a purpose-built multidimensional filter, here every chart, the data table, and the totals counter is a reactive view derived from the same flights source — ',
      code('flights.between(\'delay\', filters.delay).intersect(date, time).length(byHour)'),
      ' and so on. Brushing a chart mutates a filter range; dependent views recompute incrementally and the DOM bindings catch up on their own, with no scheduler or manual invalidation. Click and drag on any chart below.',
    ),
    aside(
      span.text(active.length()),
      span(' of '),
      span.text(flights.length()),
      span(' flights selected.'),
    ),
    div['#charts'](
      div.chart(charts, chart)
    ),
    div.list(
      div.date(flightsByDate, (node, flights, day) => node(
        div.day.text(day),
        div.flight(flights, (node, flight) => node(
          div.time.text(flight.date.to(formatTime)),
          div.origin.text(flight.origin),
          div.destination.text(flight.destination),
          div.distance.text(flight.distance.to(formatDistance)),
          div.delay.text(flight.delay.to(formatChange))
            .class('early', flight.delay.to(d => d < 0)),
        ))
      ))
    ),
    footer(
      'Sample data: ',
      a['href=http://stat-computing.org/dataexpo/2009/']('ASA Data Expo'),
      ' (US domestic flights, January 2001).',
    ),
  ))

  // dismiss the loader once render has populated the body
  dismissLoader()

  // When embedded in the landing page, post our content height to the
  // parent so it can size the iframe to fit. Avoids a visible scrollbar
  // and the "table cut off below the fold" problem.
  if (window !== window.top) {
    let queued = false
    const post = () => {
      queued = false
      const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight)
      window.parent.postMessage({ type: 'crossfilter-height', height: h }, '*')
    }
    const queue = () => {
      if (queued) return
      queued = true
      requestAnimationFrame(post)
    }
    new ResizeObserver(queue).observe(document.body)
    window.addEventListener('load', queue)
  }

  // ----------------------------------------------------------------

  async function loadFlights() {
    const loader = document.getElementById('loader')
    const $bar   = loader.querySelector('.loader-bar-fill')
    const $pct   = loader.querySelector('.loader-pct')
    const $bytes = loader.querySelector('.loader-bytes')
    const $rate  = loader.querySelector('.loader-rate')
    const $stat  = loader.querySelector('.loader-status')
    const fmtMB  = b => (b / 1048576).toFixed(1)

    const t0 = performance.now()
    const res = await fetch('./flights.js')
    const total = +res.headers.get('Content-Length') || 37313858

    if (!res.body || !res.body.getReader) {
      // browsers without streams — fall back to whole-text load
      const text = await res.text()
      $bar.style.width = '100%'
      $pct.textContent = '100%'
      $bytes.textContent = `${fmtMB(total)} / ${fmtMB(total)} MB`
      const url = URL.createObjectURL(new Blob([text], { type: 'application/javascript' }))
      const { data } = await import(url)
      URL.revokeObjectURL(url)
      return data
    }

    const reader = res.body.getReader()
    const chunks = []
    let received = 0

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      chunks.push(value)
      received += value.byteLength
      const pct = received / total
      const elapsed = (performance.now() - t0) / 1000
      $bar.style.width = `${(pct * 100).toFixed(1)}%`
      $pct.textContent = `${(pct * 100) | 0}%`
      $bytes.textContent = `${fmtMB(received)} / ${fmtMB(total)} MB`
      $rate.textContent = elapsed > 0.05 ? `${fmtMB(received / elapsed)} MB/s` : '…'
    }

    $bar.style.width = '100%'
    $pct.textContent = '100%'
    $stat.textContent = 'parsing'
    // yield a frame so the bar paints to 100% before the parse blocks
    await new Promise(r => requestAnimationFrame(r))

    const url = URL.createObjectURL(new Blob(chunks, { type: 'application/javascript' }))
    const { data } = await import(url)
    URL.revokeObjectURL(url)
    return data
  }

  function dismissLoader() {
    const loader = document.getElementById('loader')
    if (!loader) return
    loader.classList.add('done')
    setTimeout(() => loader.remove(), 360)
  }

  // render function for a chart
  function chart(node, { data, title, domain, width, ticks, format, round }, name) {
    const clip_name = `#clip-${name}`
    const clip_path = `url(${clip_name})`
    const margin = { top: 10, right: 10, bottom: 20, left: 10 }
    const height = 100
    const x = scale(domain, [0, width])
    const rx = scale([0, width], domain)
    const [{ value: max }]  = data.za('value', 1)
    const filter = filters[name]
    const range = filter
      .to(([lo = domain[0], hi = domain[1]] = []) => [lo, hi])
    const extent = range.to(([lo, hi]) => x(hi) - x(lo))
    const start = range[0].to(d => x(d))
    const barPath = data
      .to(bars(max, domain, width, name))
    const reset = () => (filters[name] = [])

    let exDown = false, exInitial = 0, exBase = [0, 0], exLeftRef = 0, exWrite

    return node(
      div.title(
        title,
        a.reset('reset')
          .style('display', filter.to(f => f?.length ? '' : 'none'))
          .on('click', reset),
      ),
      svg
        .attr('width', width + margin.left + margin.right)
        .attr('height', height + margin.top + margin.bottom)(
          g
            .attr('transform', 'translate(10, 10)')(
              clipPath[clip_name](
                rect.attr({ x: start, height, width: extent }),
              ),
              path.background.bar.attr('d', barPath),
              path.foreground.bar
                .attr('d', barPath)
                .attr('clip-path', clip_path),
              g.axis.attr('transform', `translate(0, ${height})`)(
                path.domain.attr('d', `M0.5,6V0.5H${width - 0.5}V6`),
                ...ticks.map(t => g.tick.attr('transform', `translate(${x(t)}, 0)`)(
                  line.attr('y2', 6),
                  text
                    .attr('y', 9)
                    .attr('dy', '.71em')
                    .attr('text-anchor', 'middle')
                    .text(format(t)),
                )),
              ),
              g.brush
                (node => background(node, filter, rx, width, height, round))(
                rect.background.attr({ width, height }),
                rect.extent
                  .attr('x', start)
                  .attr('height', height)
                  .attr('width', filter.to(d => d.length ? extent[value] : 0))
                  .on('pointerdown', function (d) {
                    if (!filter[value]?.length) return
                    exDown = true
                    this.setPointerCapture(d.pointerId)
                    exLeftRef = this.parentNode.getBoundingClientRect().left
                    exInitial = rx(d.x - exLeftRef)
                    exBase = [filter[0][value], filter[1][value]]
                    exWrite = rafWriter(filter, value)
                    d.stopPropagation()
                  })
                  .on('pointermove', function (d) {
                    if (!exDown) return
                    const cur = rx(d.x - exLeftRef)
                    const delta = cur - exInitial
                    const span = exBase[1] - exBase[0]
                    let lo = exBase[0] + delta
                    let hi = exBase[1] + delta
                    if (lo < domain[0]) { lo = domain[0]; hi = lo + span }
                    else if (hi > domain[1]) { hi = domain[1]; lo = hi - span }
                    if (round) { lo = round(lo); hi = round(hi) }
                    exWrite([lo, hi])
                  })
                  .on('pointerup', function (d) {
                    exDown = false
                    this.releasePointerCapture?.(d.pointerId)
                    exWrite?.flush()
                  }),
                ...[0, 1].map(resizeHandle(filter, domain, x, rx, round))
              )
            )
        )
    )
  }

  // coalesce a stream of writes onto requestAnimationFrame: only the latest
  // pending value is committed per frame. flush() commits immediately.
  function rafWriter(target, key) {
    let pending, scheduled = false
    const writer = v => {
      pending = v
      if (scheduled) return
      scheduled = true
      requestAnimationFrame(() => { scheduled = false; target[key] = pending })
    }
    writer.flush = () => { if (scheduled) { scheduled = false; target[key] = pending } }
    return writer
  }

  function background(node, filter, rx, width, height, round) {
    let down = false
    let initial
    let write
    const c = (el, { x }) => rx(x - el.getBoundingClientRect().left)
    const apply = round || (v => v)

    return node
      .on('pointerdown', function (d) {
        down = true
        initial = apply(c(this, d))
        write = rafWriter(filter, value)
        filter[value] = [initial, initial]
      })
      .on('pointermove', function (d) {
        if (down) {
          const new_val = apply(c(this, d))
          write(new_val > initial
            ? [initial, new_val]
            : [new_val, initial])
        }
      })
      .on('pointerup', d => {
        down = false
        write?.flush()
        if (filter[0][value] === filter[1][value])
          filter[value] = []
      })
  }

  function resizeHandle(filtersArr, initial, x, rx, round) {
    return function (i) {
      let down = false
      let write
      let leftRef = 0
      const translate = (d = initial[i]) => `translate(${x(d)}, 0)`
      const filter = filtersArr[i]
      const apply = round || (v => v)
      const height = 100
      const classes = ['w', 'e']
      const d = i ? 1 : -1
      const y = height / 3
      const resizePath = 'M' + (.5 * d) + ',' + y
        + 'A6,6 0 0 ' + i + ' ' + (6.5 * d) + ',' + (y + 6)
        + 'V' + (2 * y - 6)
        + 'A6,6 0 0 ' + i + ' ' + (.5 * d) + ',' + (2 * y)
        + 'Z'
        + 'M' + (2.5 * d) + ',' + (y + 8)
        + 'V' + (2 * y - 8)
        + 'M' + (4.5 * d) + ',' + (y + 8)
        + 'V' + (2 * y - 8)

      return g.resize
        .class(classes[i])
        .attr('transform', filter.to(translate))
        .style('display', filter.to(d => d ? '' : 'none'))
        .on('pointerdown', function(d) {
          down = true
          this.setPointerCapture(d.pointerId)
          leftRef = this.parentNode.getBoundingClientRect().left
          write = rafWriter(filtersArr, value)
          d.stopPropagation()
        })
        .on('pointermove', function(e){
          if (!down) return
          const cur = apply(rx(e.x - leftRef))
          const other = filtersArr[1 - i][value]
          write(cur < other ? [cur, other] : [other, cur])
        })
        .on('pointerup', function (d) {
          down = false
          this.releasePointerCapture?.(d.pointerId)
          write?.flush()
        })(
          rect
            .attr({ x: -3, width: 6, height })
            .style('visibility', 'hidden'),
          path.attr('d', resizePath),
        )
    }
  }

  function parseDate(d) {
    return new Date(2001,
      d.substring(0, 2) - 1,
      d.substring(2, 4),
      d.substring(4, 6),
      d.substring(6, 8)
    );
  }

  // calculate path for svg bars
  function bars(max, domain, width, name/*, ngroups*/) {
    return function (groups) {
      if (max[value] === undefined) return ''
      const height = 100
      const x = scale(domain, [0, width])
      const y = scale([0, max[value]], [height, 0])
      let path = ''
      for (const i in groups) {
        const len = groups[i].value;
        path += `M${x(+i)},${height}V${y(len)}h9V${height}`
      }
      return path
    }
  }

  // poor man's linear scale
  function scale(i, o) {
    return function (value) {
      if (i[1] === i[0]) return 0
      const irange = i[1] - i[0]
      const orange = o[1] - o[0]
      const m = (value - i[0]) / irange
      const result = o[0] + m * orange
      return result
    }
  }

</script>
